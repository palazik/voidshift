d-i preseed/late_command string \
  mkdir -p /target/usr/share/fastfetch/logos; \
  cp /cdrom/live/filesystem.squashfs /tmp/fs.squashfs || true; \
  cp /etc/os-release /target/etc/os-release; \
  cp /etc/lsb-release /target/etc/lsb-release; \
  cp /etc/debian_version /target/etc/debian_version; \
  cp /etc/issue /target/etc/issue; \
  cp /etc/issue.net /target/etc/issue.net; \
  cp -r /etc/fastfetch /target/etc/fastfetch; \
  cp -r /usr/share/fastfetch/logos /target/usr/share/fastfetch/logos
